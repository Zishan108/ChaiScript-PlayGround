<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChaiScript Engine</title>

    <!-- FAVICON -->
    <link rel="icon" href="{% static 'engine/img/ChaiScript.ico' %}">

    <style>
        /* ===============================
           THEME VARIABLES
           =============================== */

        /* 🌞 LIGHT MODE (DEFAULT) */
        :root {
            --bg-page: #f6fff5;
            --bg-navbar: #ffffff;
            --bg-panel: #ffffff;
            --bg-editor: #f0fff4;
            --bg-output: #fcfffa;

            --border-soft: #d9e7d8;
            --border-strong: #b7d7b0;

            --text-main: #1f2933;

        /* 🌚 DARK MODE */

            --bg-page: #0f1412;
            --bg-navbar: #141a17;
            --bg-panel: #141a17;
            --bg-editor: #101614;
            --bg-output: #0c110f;

            --accent-green: #4fd1a5;

        body.dark #runbar,

           =============================== */

        }

            border: 1px solid var(--border-soft);
            padding: 15px;
            overflow: auto;
            border-radius: 8px;
        }

            min-height: 0;

        FORCE MONACO TO MATCH OUTPUT
        =============================== */

        .monaco-editor,

<script>
(function () {
    // ── Estimate this TAB's CPU using requestAnimationFrame timing ──
    let lastTime = performance.now();
    let cpuLoad = 0;

    function estimateCPU() {
        const now = performance.now();
        const delta = now - lastTime;
        lastTime = now;
        // If frame took longer than 16ms (60fps ideal), we're under load
        const load = Math.min(100, Math.max(0, ((delta - 16) / 84) * 100));
        cpuLoad = cpuLoad * 0.85 + load * 0.15; // smooth
        requestAnimationFrame(estimateCPU);
    }
    requestAnimationFrame(estimateCPU);

    // ── Estimate this TAB's RAM using performance.memory ──
    function getRAM() {
        if (performance.memory) {
            const used = performance.memory.usedJSHeapSize;
            const total = performance.memory.jsHeapSizeLimit;
            const pct = Math.min(100, (used / total) * 100);
            const mb = (used / 1024 / 1024).toFixed(1);
            return { pct, label: mb + " MB" };
        }
        return null;
    }

    // ── Update UI every second ──
    setInterval(() => {
        // CPU
        const cpuPct = Math.round(cpuLoad);
        document.getElementById("cpu-val").textContent = cpuPct + "%";
        document.getElementById("cpu-bar").style.width = cpuPct + "%";

        // RAM
        const ram = getRAM();
        if (ram) {
            document.getElementById("ram-val").textContent = ram.label;
            document.getElementById("ram-bar").style.width = ram.pct.toFixed(1) + "%";
        } else {
            document.getElementById("ram-val").textContent = "N/A";
        }
    }, 1000);
})();

document.getElementById("font-slider").addEventListener("input", function () {
        if (window.editor) {
            window.editor.updateOptions({ fontSize: parseInt(this.value) });
        }
    });
</script>

<script>

    let executionTrace = [];
    let currentStep = 0;
    let highlightDecoration = [];
    let astTree = null;

    function playBrewSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();

        // Bubble 1
        const o1 = ctx.createOscillator();
        const g1 = ctx.createGain();
        o1.connect(g1); g1.connect(ctx.destination);
        o1.type = "sine";
        o1.frequency.setValueAtTime(520, ctx.currentTime);
        o1.frequency.exponentialRampToValueAtTime(280, ctx.currentTime + 0.15);
        g1.gain.setValueAtTime(0.3, ctx.currentTime);
        g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        o1.start(); o1.stop(ctx.currentTime + 0.15);

        // Bubble 2
        const o2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type = "sine";
        o2.frequency.setValueAtTime(700, ctx.currentTime + 0.1);
        o2.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.25);
        g2.gain.setValueAtTime(0.2, ctx.currentTime + 0.1);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        o2.start(ctx.currentTime + 0.1); o2.stop(ctx.currentTime + 0.25);
    }

    // INTRO (UNCHANGED)
    setTimeout(() => {
        document.getElementById("intro").style.display = "none";
        document.getElementById("app").style.display = "flex";
    }, 5000);

    // THEME TOGGLE (UNCHANGED)
    function toggleTheme() {
        document.body.classList.toggle("dark");
        localStorage.setItem(
            "theme",
            document.body.classList.contains("dark") ? "dark" : "light"
        );
        monaco.editor.setTheme(
        document.body.classList.contains("dark") ? "vs-dark" : "vs"
);
    }

    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }

    // RUN CODE (UNCHANGED)
    function runCode() {

        playBrewSound();
        const code = window.editor.getValue();
        const runStart = performance.now();

        fetch("/engine/run/", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "code=" + encodeURIComponent(code)
        })
        .then(res => res.json())
        .then(data => {

            // =========================
            // OUTPUT
            // =========================
            document.getElementById("output").textContent = data.output || "";

            const elapsed = (performance.now() - runStart).toFixed(0);
            document.getElementById("timer-val").textContent = elapsed + " ms";

            // =========================
            // EXECUTION TRACE
            // =========================
            executionTrace = data.trace || [];
            currentStep = 0;

            console.log("Execution Trace:", executionTrace);

            // =========================
            // AST
            // =========================
            astTree = data.ast || null;

            console.log("AST:", astTree);

            renderAST(astTree);

            // =========================
            // RENDER
            // =========================
            renderStep();

        })
        .catch(err => {
            console.error("Run error:", err);
            document.getElementById("output").textContent = "Error running code";
        });
    }

    // CTRL + ENTER (ADDED)
    document.addEventListener("keydown", function (e) {
        if (e.ctrlKey && e.key === "Enter") {
            e.preventDefault();
            runCode();
        }
    });

    function renderAST(astData) {

    d3.select("#ast-tree").selectAll("*").remove();

    if (!astData) return;

    const container = document.getElementById("ast-tree");
    container.innerHTML = "";

    const width = container.clientWidth;
    const height = 400;

    const svg = d3.select("#ast-tree")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    const g = svg.append("g");

    const zoom = d3.zoom().on("zoom", (event) => {
        g.attr("transform", event.transform);
    });

    svg.call(zoom);

    const root = d3.hierarchy(astData);

    const treeLayout = d3.tree().size([width - 100, height - 100]);

    treeLayout(root);

    // links
    g.selectAll("line")
        .data(root.links())
        .enter()
        .append("line")
        .attr("x1", d => d.source.x + 50)
        .attr("y1", d => d.source.y + 50)
        .attr("x2", d => d.target.x + 50)
        .attr("y2", d => d.target.y + 50)
        .attr("stroke", "#888");

    // nodes
    const node = g.selectAll("g")
        .data(root.descendants())
        .enter()
        .append("g")
        .attr("transform", d => `translate(${d.x + 50},${d.y + 50})`);

    node.append("circle")
        .attr("r", 8)
        .attr("fill", "#2f855a");

    node.append("text")
    .each(function(d) {

        const text = d3.select(this);

        let type = d.data.type;
        let value = d.data.value;

        // Friendly names
        if (type === "ListNode") type = "Program";
        if (type === "VarAssignNode") type = "Assign";
        if (type === "VarAccessNode") type = "Variable";
        if (type === "NumberNode") type = "Number";
        if (type === "StringNode") type = "String";
        if (type === "BinOpNode") type = "BinaryOp";
        if (type === "CallNode") type = "Function Call";
        if (type === "IfNode") type = "If Condition";
        if (type === "ForNode") type = "For Loop";
        if (type === "WhileNode") type = "While Loop";
        if (type === "FuncDefNode") type = "Function";

        // FIRST LINE → NODE TYPE
        text.append("tspan")
            .text(type)
            .attr("x", 12)
            .attr("dy", "0em");

        // SECOND LINE → VALUE (if exists)
        if (value) {
            text.append("tspan")
                .text(value)
                .attr("x", 12)
                .attr("dy", "1.2em")
                .style("fill", "var(--accent-yellow)");
        }

    })
    .attr("dx", 12)
    .attr("dy", 4)
    .style("font-size", "12px")
    .style("fill", "var(--text-main)");
}

function highlightASTNode(lineNumber) {

    const nodes = document.querySelectorAll("#ast-tree div");

    nodes.forEach(n => {
        n.style.background = "";
    });

    nodes.forEach(n => {

        if (parseInt(n.dataset.line) === lineNumber) {

            n.style.background = "rgba(246,196,83,0.35)";
            n.style.borderLeft = "3px solid #f6c453";
            n.style.paddingLeft = "6px";
        }

    });

}

function renderStep() {

    const container = document.getElementById("viz-content");

    if (executionTrace.length === 0) {
        container.textContent = "No execution trace.";
        return;
    }

    const step = executionTrace[currentStep];
    const prevStep = executionTrace[currentStep - 1];

    let html = `
        <div><strong>Step:</strong> ${currentStep + 1} / ${executionTrace.length}</div>
        <div><strong>Node:</strong> ${step.node}</div>
        <div><strong>Line:</strong> ${step.line}</div>
        <div style="margin-top:6px;"><strong>Variables:</strong></div>
    `;

    const vars = step.symbols || {};

    for (const k in vars) {

        let changed = false;

        if (prevStep && prevStep.symbols) {
            if (prevStep.symbols[k] !== vars[k]) {
                changed = true;
            }
        } else {
            // first appearance of variable
            changed = true;
        }

        if (changed) {
            html += `<div class="var-changed">${k} = ${vars[k]}</div>`;
        } else {
            html += `<div>${k} = ${vars[k]}</div>`;
        }
    }

    container.innerHTML = html;

    // highlight editor line
    highlightLine(step.line);

    // highlight AST node
    highlightASTNode(step.line);
}

function nextStep() {
    if (currentStep < executionTrace.length - 1) {
        currentStep++;
        renderStep();
    }
}

function prevStep() {
    if (currentStep > 0) {
        currentStep--;
        renderStep();
    }
}

function highlightLine(lineNumber) {
    if (!window.editor) return;

    highlightDecoration = window.editor.deltaDecorations(
        highlightDecoration,
        [
            {
                range: new monaco.Range(lineNumber, 1, lineNumber, 1),
                options: {
                    isWholeLine: true,
                    className: "execution-line"
                }
            }
        ]
    );

    window.editor.revealLineInCenter(lineNumber);
}

</script>

<script>
require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' } });

require(['vs/editor/editor.main'], function () {

    /* ===============================
       1️⃣ LANGUAGE REGISTRATION
       =============================== */
    monaco.languages.register({ id: 'chaiscript' });

    /* ===============================
       2️⃣ KEYWORDS & BUILT-INS
       =============================== */

    const CHAI_KEYWORDS = [
        'cup','and','or','not',
        'hot','mild','chilled',
        'for_chai','to_chai','STEP',
        'while_chai',
        'brew','then_chai','sip',
        'return_chai','continue_chai','break_chai', 'try_chai', 'catch_chai', 'true', 'false'
    ];

    const CHAI_FUNCTIONS = [
        // Utility
        'serveChai','serve_ret','orderChai','orderChai_int',
        'clean','cls','type_chai','current_date_time',
        'list_len','str_len','len','int','str','float','time_freeze',

        // Boolean
        'is_chai_num','is_chai_str','is_chai_list',
        'is_brew','is_empty',

        // String
        'to_lower','to_upper','char_at','index_of','slice',
        'starts_with','ends_with','trim','replace',
        'split_to_list','capitalize','title','is_equals',

        // List
        'append','pop','extend','sort_list','reverse_list',
        'range','element_at','join_to_str',

        // Math constants
        'Math_PI','Math_E',

        // Math core
        'Math_mod_div','Math_factorial','Math_sqrt',
        'Math_floor','Math_ceil','Math_round','Math_absoluteval',
        'Math_random_chai',

        // Trigonometry
        'Math_sin','Math_cos','Math_tan','Math_sec','Math_cosec','Math_cot',
        'Math_arcsin','Math_arccos','Math_arctan',
        'Math_arcsec','Math_arccosec','Math_arccot',

        // Hyperbolic
        'Math_sinh','Math_cosh','Math_tanh','Math_sech','Math_cosech','Math_coth',

        'Math_arcsech','Math_arccosech','Math_arccoth'
    ];

    /* ===============================
       3️⃣ SYNTAX HIGHLIGHTING
       =============================== */
    monaco.languages.setMonarchTokensProvider('chaiscript', {
        keywords: CHAI_KEYWORDS,
        functions: CHAI_FUNCTIONS,

        tokenizer: {
            root: [
                [/[a-zA-Z_][\w_]*/, {
                    cases: {
                        '@keywords': 'keyword',
                        '@functions': 'type.identifier',
                        '@default': 'identifier'
                    }
                }],
                [/\d+(\.\d+)?/, 'number'],
                [/".*?"/, 'string'],
                [/[{}()\[\]]/, '@brackets'],
                [/[+\-*\/^=<>!]+/, 'operator'],
                [/#.*$/, 'comment']
            ]
        }
    });

    /* ===============================
       4️⃣ AUTOCOMPLETE
       =============================== */
    monaco.languages.registerCompletionItemProvider('chaiscript', {
    triggerCharacters: ['f', 'w', 'b', 'h', 'c', 'm'],
    provideCompletionItems: () => ({
        suggestions: [

            // 🔁 FOR LOOP
            {
                label: 'for',
                kind: monaco.languages.CompletionItemKind.Snippet,
                insertTextRules:
                    monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                insertText:
`for_chai \${1:i} = \${2:start} to_chai \${3:end} then_chai
    \${4:# code block}
sip`,
                documentation: 'ChaiScript for loop'
            },

            // 🔄 WHILE LOOP
            {
                label: 'while',
                kind: monaco.languages.CompletionItemKind.Snippet,
                insertTextRules:
                    monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                insertText:
`while_chai \${1:condition} then_chai
    \${2:# code block}
sip`,
                documentation: 'ChaiScript while loop'
            },

            // 🍵 FUNCTION
            {
                label: 'brew',
                kind: monaco.languages.CompletionItemKind.Snippet,
                insertTextRules:
                    monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                insertText:
`brew \${1:functionName}(\${2:params})
    \${3: #code block}
sip`,
                documentation: 'ChaiScript function'
            },

            {
    label: 'hot-mild-chilled',
    kind: monaco.languages.CompletionItemKind.Snippet,
    insertTextRules:
        monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
    insertText:
`hot \${1: statement 1} > \${2: statement 2} then_chai
    #code block ;

mild \${3: statement 1} < \${4: statement 2} then_chai
    #code block ;

chilled
    #code block ;
sip;`,
    documentation: 'ChaiScript hot–mild–chilled conditional'
},

    {
    label: 'hot-chilled',
    kind: monaco.languages.CompletionItemKind.Snippet,
    insertTextRules:
        monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
    insertText:
`hot \${1: statement 1} > \${2:statement 2} then_chai
    #code block ;

chilled
    #code block ;
sip;`,
    documentation: 'ChaiScript hot–chilled conditional'
},

            // ✨ keep normal keywords
            ...CHAI_KEYWORDS.map(k => ({
                label: k,
                kind: monaco.languages.CompletionItemKind.Keyword,
                insertText: k
            })),

            // 🧠 functions
            ...CHAI_FUNCTIONS.map(fn => ({
                label: fn,
                kind: monaco.languages.CompletionItemKind.Function,
                insertText: fn + '('
            }))
        ]
    })
});
    /* ===============================
       5️⃣ EDITOR CREATION (LAST)
       =============================== */
    window.editor = monaco.editor.create(
        document.getElementById('editor'),
        {
            value: '',
            language: 'chaiscript',
            theme: document.body.classList.contains('dark') ? 'vs-dark' : 'vs',
            fontSize: 16,
            automaticLayout: true,
            minimap: { enabled: false }
        }
    );

    // Ctrl + Enter inside editor
    window.editor.addCommand(
        monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter,
        function () {
            runCode();
        }
    );
});
</script>
